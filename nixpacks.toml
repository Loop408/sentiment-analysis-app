[phases.setup]
nixPkgs = ["nodejs", "python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install -U pip",
  "/opt/venv/bin/pip install -r backend/requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && CI=false npm run build"
]

[start]
cmd = "cd backend && /opt/venv/bin/gunicorn app:app -b 0.0.0.0:${PORT:-5000}"